name: Build & Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # ── 检查 commit message ──────────────────────────────
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="$COMMIT_MSG"

          # 从 Desuwa.csproj 提取版本号
          VERSION="v$(grep '<Version>' Desuwa.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

          # PR 始终构建
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true"    >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 初始化标志
          BUILD=false
          RELEASE=false

          # "build release" = 构建 + GitHub Release
          if echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          # "build action" = 仅构建
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          echo "should_build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"

          echo "📋 Flags: build=$BUILD release=$RELEASE"

  # ── 构建 Windows x64 ───────────────────────────────────
  build:
    name: Build Windows x64
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build self-contained version
        run: |
          dotnet publish Desuwa.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=none -o publish-selfcontained

      - name: Build runtime-dependent version
        run: |
          dotnet publish Desuwa.csproj -c Release --self-contained false -p:DebugType=none -o publish-runtime-dependent

      - name: Prepare artifacts
        shell: pwsh
        run: |
          $VERSION = "${{ needs.check.outputs.version }}"

          # Self-contained exe
          $SELFCONTAINED_NAME = "Desuwa-windows-x64-self-contained-${VERSION}.exe"
          Write-Host "📦 Self-contained: $SELFCONTAINED_NAME"
          Copy-Item "publish-selfcontained\Desuwa.exe" $SELFCONTAINED_NAME

          # Runtime-dependent zip
          $RUNTIME_DEP_NAME = "Desuwa-windows-x64-runtime-dependent-${VERSION}.zip"
          Write-Host "📦 Runtime-dependent version: $RUNTIME_DEP_NAME"
          Compress-Archive -Path "publish-runtime-dependent\*" -DestinationPath $RUNTIME_DEP_NAME

          # Save names for later steps
          echo "selfcontained_name=$SELFCONTAINED_NAME" >> $env:GITHUB_ENV
          echo "runtime_dep_name=$RUNTIME_DEP_NAME" >> $env:GITHUB_ENV

      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.selfcontained_name }}
          path: ${{ env.selfcontained_name }}

      - name: Upload runtime-dependent artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.runtime_dep_name }}
          path: ${{ env.runtime_dep_name }}

  # ── 发布到 GitHub Releases ─────────────────────────────
  release:
    name: Publish Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          ls -lh

      - name: Delete existing release & tag (force fresh release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          echo "🗑️ Cleaning up existing release/tag: $VERSION"
          gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || echo "No existing release to delete"
          sleep 3

      - name: Generate release notes
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"
          COMMIT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

          # 查找上一个 release tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)

          # 生成 commit log
          if [ -n "$PREV_TAG" ]; then
            COMMIT_LOG="Changes since **${PREV_TAG}**:"
            COMMIT_LOG="${COMMIT_LOG}"$'\n'""
            COMMIT_LOG="${COMMIT_LOG}"$'\n'"$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s (`%h`) @%an %ad' --date=format:'%Y-%m-%d' --reverse)"
          else
            COMMIT_LOG="Initial release"
          fi

          # 读取模板并替换占位符
          NOTES=$(cat .github/release_template.md)
          NOTES="${NOTES//__VERSION__/$VERSION}"
          NOTES="${NOTES//__REPO__/$REPO}"
          NOTES="${NOTES//__BASE_URL__/$BASE_URL}"
          NOTES="${NOTES//__COMMIT_SHA__/$COMMIT_SHA}"
          NOTES="${NOTES//__BUILD_DATE__/$BUILD_DATE}"
          NOTES="${NOTES//__PREV_TAG__/$PREV_TAG}"
          NOTES="${NOTES//__COMMIT_LOG__/$COMMIT_LOG}"

          echo "$NOTES" > release_notes.md

          echo "📝 Generated release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          gh release create "$VERSION" \
            --title "Desuwa ${VERSION}" \
            --notes-file release_notes.md \
            --latest \
            Desuwa-windows-x64-self-contained-${VERSION}.exe \
            Desuwa-windows-x64-runtime-dependent-${VERSION}.zip
